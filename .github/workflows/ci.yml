name: CI - Build & Test

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["develop"]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build & Test
        run: mvn -B verify
